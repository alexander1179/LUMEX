<div style="font-family: Arial, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px; color: #1f2937;">
  <h2 style="margin: 0 0 16px; color: #111827;">Codigo de acceso Lumex</h2>
  <p style="font-size: 16px; line-height: 1.5; margin: 0 0 16px;">
    Usa este codigo de 6 digitos en la app para continuar con la recuperacion de tu contrasena.
  </p>

  <div style="margin: 24px 0; padding: 18px; background: #f3f4f6; border-radius: 12px; text-align: center;">
    <div style="font-size: 32px; font-weight: 700; letter-spacing: 8px; color: #d32f2f;">
      {{ .Token }}
    </div>
  </div>

  <p style="font-size: 14px; line-height: 1.5; margin: 0 0 12px; color: #4b5563;">
    No abras el enlace del correo. Regresa a la app Lumex e ingresa este codigo manualmente.
  </p>

  <p style="font-size: 14px; line-height: 1.5; margin: 0; color: #6b7280;">
    Si no solicitaste este codigo, ignora este mensaje.
  </p>
</div>
